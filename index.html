<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<!-- ✨ Romantic Font -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* LOGIN */
#login {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

#loginBox {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    border: none;
    background: #ff4d6d;
    color: white;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #e63956;
    transform: scale(1.05);
}

/* MAIN CARD 💌 */
#main {
    display: none;
    padding: 20px;
}

.card {
    max-width: 500px;
    margin: auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* 💖 BEAUTIFUL TITLE */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3.5em;
    color: #b3003c;
    margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(255, 77, 109, 0.6);
}

/* 💌 MESSAGE */
#typedText {
    font-size: 1.1em;
    color: #444;
    line-height: 1.7;
    margin-top: 15px;
    animation: fadeIn 2s ease-in;
}

/* 📸 MEDIA */
.slideshow img,
.slideshow video {
    width: 220px;
    border-radius: 15px;
    margin-top: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* 💖 HEARTS */
.heart {
    position: fixed;
    bottom: -10px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    to {
        transform: translateY(-900px);
        opacity: 0;
    }
}

/* ✨ FADE */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div id="loginBox">
        <h2>Enter Password 🎁</h2>
        <input type="password" id="password">
        <br>
        <button onclick="checkPassword()">Open</button>
    </div>
</div>

<!-- MAIN -->
<div id="main">
    <div class="card">

        <h1>Happy Birthday 🎉</h1>

        <div id="typedText"></div>

        <div class="slideshow" id="mediaContainer"></div>

        <audio id="bgMusic" loop hidden>
            <source src="your-song.mp3" type="audio/mpeg">
        </audio>

    </div>
</div>

<script>
// PASSWORD
function checkPassword() {
    if (document.getElementById("password").value === "1234") {
        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "block";

        startTyping();
        showMedia();
        document.getElementById("bgMusic").play();
    } else {
        alert("Wrong password 😢");
    }
}

// 💌 MESSAGE
const message = "Happy Birthday ❤️\n\nYou truly mean so much to me, more than words can ever explain.\n\nI’m really grateful for you, for everything you do, and for the happiness you bring into my life.\n\nI hope today makes you smile as much as you make me smile 💖";

let i = 0;

function startTyping() {
    function type() {
        if (i < message.length) {
            document.getElementById("typedText").innerHTML += 
                message[i] === "\n" ? "<br>" : message[i];
            i++;
            setTimeout(type, 40);
        }
    }
    type();
}

// 🖼️ + 🎥 MEDIA
const media = [
    { type: "image", src: "photo1.jpg" },
    { type: "video", src: "video.mp4" },
    { type: "image", src: "photo2.jpg" }
];

let index = 0;
const container = document.getElementById("mediaContainer");

function showMedia() {
    container.innerHTML = "";
    const item = media[index];

    if (item.type === "image") {
        const img = document.createElement("img");
        img.src = item.src;
        container.appendChild(img);
        setTimeout(nextMedia, 2200);
    } else {
        const video = document.createElement("video");
        video.src = item.src;
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        container.appendChild(video);
        video.onended = nextMedia;
    }
}

function nextMedia() {
    index = (index + 1) % media.length;
    showMedia();
}

// 💖 HEARTS
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 15 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 400);
</script>

</body>
</html>
